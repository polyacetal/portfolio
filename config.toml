baseURL = 'http://portfolio.udhi.net/'
languageCode = 'ja_jp'
title = 'My Portfolio'
theme = 'hugo-theme-stack'

defaultContentLanguage = 'jp'

[params]
  [params.footer]
    since = '2023'
    
  [params.sidebar]
    [params.sidebar.avatar]
      enabled = true
      local = true
      src = 'img/avatar.png'
      
  [params.colorScheme]
    toggle = true
    default = 'auto'

[menu]
  main = []
  [menu.social]
    identifier = 'github'
    name = 'GitHub'
    url = 'https://github.com/polyacetal'
    [menu.social.params]
      icon = 'brand-github'
