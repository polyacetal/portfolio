baseURL = 'http://portfolio.udhi.net/'
languageCode = 'en_us'
title = 'My Portfolio'
theme = 'hugo-theme-stack'

defaultContentLanguage = 'jp'

[params]
  [params.footer]
    since = '2023'
    
  [params.sidebar]
    [params.sidebar.avatar]
      enabled = true
      local = true
      src = 'https://github.com/polyacetal.png'
      
  [params.colorScheme]
    toggle = true
    default = 'auto'
  socialIcons = [
    { name = 'github', url = 'https://github.com/polyacetal' }
    ]

[menu]
  main = []
  social = [
    { identifier = 'github', name = 'GitHub', url = 'https://github.com/polyacetal', icon = 'brand-github'}
  ]
